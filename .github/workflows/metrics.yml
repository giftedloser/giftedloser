name: Metrics
on:
  schedule: [{cron: "0 */6 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: github-metrics.svg
          template: classic
          base: header
          base_indepth: no
          config_timezone: America/Denver

          # Languages
          plugin_languages: yes
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_categories: markup, programming
          plugin_languages_threshold: 2%

          # 3D contribution calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Explicitly disable all other plugins
          plugin_activity: no
          plugin_achievements: no
          plugin_calendar: no
          plugin_code: no
          plugin_discussions: no
          plugin_followup: no
          plugin_gists: no
          plugin_habits: no
          plugin_introduction: no
          plugin_lines: no
          plugin_music: no
          plugin_notable: no
          plugin_pagespeed: no
          plugin_people: no
          plugin_posts: no
          plugin_projects: no
          plugin_reactions: no
          plugin_repositories: no
          plugin_skyline: no
          plugin_sponsors: no
          plugin_stargazers: no
          plugin_starlists: no
          plugin_stars: no
          plugin_topics: no
          plugin_traffic: no
          plugin_tweets: no
          plugin_wakatime: no
